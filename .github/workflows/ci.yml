name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-duckdb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests (DuckDB)
        run: uv run pytest tests/ -q

  test-postgres:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --extra postgres

      - name: Start PostgreSQL
        run: docker compose up -d --wait

      - name: Run tests (PostgreSQL)
        env:
          PRME_TEST_DATABASE_URL: postgresql://prme_test:prme_test@localhost:5432/prme_test
        run: uv run pytest tests/ -q

      - name: Stop PostgreSQL
        if: always()
        run: docker compose down

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff
        run: uv run ruff check src/ tests/

  simulations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run simulations
        run: uv run python scripts/run_simulations.py
