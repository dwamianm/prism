services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: prme_test
      POSTGRES_PASSWORD: prme_test
      POSTGRES_DB: prme_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prme_test -d prme_test"]
      interval: 5s
      timeout: 5s
      retries: 5
